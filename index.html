<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Verificação de acesso</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; display: grid; place-items: center; min-height: 100vh; margin: 0; padding: 1rem; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 2rem; max-width: 28rem; width: 100%; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
    h1 { font-size: 1.25rem; margin: 0 0 .5rem; color: #111827; }
    p { color: #4b5563; margin: 0 0 1.5rem; font-size: .875rem; }
    .widget { display: flex; justify-content: center; margin: 1rem 0; }
    .status { font-size: .875rem; min-height: 1.25rem; }
    .ok { color: #059669; font-weight: 500; }
    .err { color: #dc2626; }
    .muted { color: #6b7280; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verificação de acesso</h1>
    <p>Confirme que você é humano para continuar</p>
    <div class="widget">
      <div class="cf-turnstile"
           data-sitekey="0x4AAAAAADR6D2_ZQAPgG7jz"
           data-callback="onVerify"
           data-theme="light"></div>
    </div>
    <div id="status" class="status"></div>
  </div>

  <script>
    const FALLBACK_URL = "https://www.google.com";

    // Extrai o slug da URL: /s/<slug>
    function getSlug() {
      const m = window.location.pathname.match(/^\/s\/(.+)$/);
      return m ? decodeURIComponent(m[1]) : "";
    }

    const status = document.getElementById("status");

    if (!getSlug()) {
      status.textContent = "Redirecionando...";
      status.className = "status err";
      window.location.replace(FALLBACK_URL);
    }

    async function onVerify(token) {
      const slug = getSlug();
      if (!slug) {
        window.location.replace(FALLBACK_URL);
        return;
      }
      status.textContent = "Verificando...";
      status.className = "status muted";
      try {
        const r = await fetch("/api/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, slug }),
        });
        const data = await r.json();
        if (data.success && data.redirect) {
          status.textContent = "Verificado — redirecionando...";
          status.className = "status ok";
          setTimeout(() => window.location.replace(data.redirect), 600);
        } else {
          status.textContent = "Falha na verificação. Recarregue a página.";
          status.className = "status err";
          if (data.redirect) {
            setTimeout(() => window.location.replace(data.redirect), 1500);
          }
        }
      } catch {
        status.textContent = "Erro de conexão. Tente novamente.";
        status.className = "status err";
      }
    }
    window.onVerify = onVerify;
  </script>
</body>
</html>
